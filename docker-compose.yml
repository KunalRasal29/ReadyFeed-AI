services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readyfeed_db
      POSTGRES_USER: readyfeed_user
      POSTGRES_PASSWORD: readyfeed_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readyfeed_user -d readyfeed_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    environment: &backend_environment
      SECRET_KEY: ${SECRET_KEY:-django-insecure-readyfeed-ai-docker-dev}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://readyfeed_user:readyfeed_password@db:5432/readyfeed_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      COMMUTE_PREP_LOOKAHEAD_HOURS: ${COMMUTE_PREP_LOOKAHEAD_HOURS:-4}
      COMMUTE_PREP_SCAN_INTERVAL_MINUTES: ${COMMUTE_PREP_SCAN_INTERVAL_MINUTES:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OFFLINE_FILE_STORAGE: ${OFFLINE_FILE_STORAGE:-local}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-ap-south-1}
      AWS_S3_PRESIGNED_EXPIRES: ${AWS_S3_PRESIGNED_EXPIRES:-3600}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE:-virtual}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      RUN_MIGRATIONS: "true"
      SEED_DEFAULTS: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A readyfeed_ai worker -l info
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
      SEED_DEFAULTS: "false"
    volumes:
      - .:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A readyfeed_ai beat -l info --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *backend_environment
      RUN_MIGRATIONS: "false"
      SEED_DEFAULTS: "false"
    volumes:
      - .:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm exec vite -- --host 0.0.0.0
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_media:
  frontend_node_modules:
